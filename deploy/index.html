<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DentStage 凹痕工廠 — 報價單工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#B31B1B; --red-h:#CC2020; --red-d:#8B1212;
  --dark:#181818; --panel:#212121; --mid:#2A2A2A;
  --card:#303030; --border:#3C3C3C;
  --silver:#A0A0A0; --lt:#C8C8C8; --white:#FFFFFF;
}
body{font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;background:var(--dark);color:var(--white);display:flex;height:100vh;overflow:hidden;}

/* ── FORM PANEL ── */
.form-panel{width:460px;min-width:460px;background:var(--panel);display:flex;flex-direction:column;height:100vh;border-right:3px solid var(--red);}

.fp-header{background:var(--dark);padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--red-d);flex-shrink:0;}
.fp-header img{width:44px;height:44px;object-fit:contain;border-radius:50%;}
.fp-header-text{flex:1;}
.fp-header-text h1{font-size:14px;font-weight:700;letter-spacing:1px;}
.fp-header-text p{font-size:11px;color:var(--silver);margin-top:1px;}

/* Language Toggle */
.lang-toggle{display:flex;background:var(--mid);border:1px solid var(--border);border-radius:20px;overflow:hidden;flex-shrink:0;}
.lt-btn{background:transparent;border:none;color:var(--silver);padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px;transition:all .15s;}
.lt-btn.active{background:var(--red);color:var(--white);}
.lt-btn:not(.active):hover{color:var(--lt);}

.fp-body{flex:1;overflow-y:auto;padding:16px;}
.fp-body::-webkit-scrollbar{width:5px;}
.fp-body::-webkit-scrollbar-track{background:var(--dark);}
.fp-body::-webkit-scrollbar-thumb{background:var(--red-d);border-radius:3px;}

.sec{margin-bottom:20px;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--red-h);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

.field{margin-bottom:9px;}
.field label{display:block;font-size:11px;color:var(--silver);margin-bottom:3px;}
.field input,.field select,.field textarea{width:100%;background:var(--mid);border:1px solid var(--border);border-radius:4px;color:var(--white);padding:7px 10px;font-size:13px;font-family:inherit;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--red);}
.field select option{background:var(--mid);}
.field textarea{resize:vertical;min-height:58px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}

/* Item Cards */
.item-card{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:9px;margin-bottom:8px;}
.item-card:hover{border-color:var(--red-d);}
.item-main{display:grid;grid-template-columns:auto 1fr 40px 52px 72px 72px 26px;gap:4px;margin-bottom:5px;align-items:center;}
.item-hdr{display:grid;grid-template-columns:auto 1fr 40px 52px 72px 72px 26px;gap:4px;margin-bottom:6px;}
.item-code-input{min-width:48px;}
.item-hdr span{font-size:10px;color:var(--silver);text-align:center;}
.item-card input{background:var(--mid);border:1px solid var(--border);border-radius:3px;color:var(--white);padding:5px 6px;font-size:12px;font-family:inherit;width:100%;}
.item-card input:focus{outline:none;border-color:var(--red);}
.item-card input[readonly]{color:var(--silver);background:var(--dark);cursor:default;}
.item-note{display:flex;align-items:center;gap:6px;}
.item-note label{font-size:10px;color:var(--silver);white-space:nowrap;}
.item-note input{flex:1;background:var(--mid);border:1px solid var(--border);border-radius:3px;color:var(--lt);padding:4px 7px;font-size:11px;font-family:inherit;}
.item-note input:focus{outline:none;border-color:var(--red);}
.btn-del{background:transparent;border:none;color:#6A2020;cursor:pointer;font-size:18px;padding:0;line-height:1;transition:color .15s;}
.btn-del:hover{color:#FF4444;}
.btn-add{width:100%;background:transparent;border:1px dashed var(--border);border-radius:4px;color:var(--silver);cursor:pointer;font-size:12px;padding:7px;font-family:inherit;transition:all .15s;}
.btn-add:hover{border-color:var(--red);color:var(--red-h);}

/* Import Bar */
.fp-import{padding:8px 16px;background:var(--dark);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn-import{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--silver);cursor:pointer;font-size:11px;padding:6px 12px;font-family:inherit;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.btn-import:hover{border-color:var(--red);color:var(--red-h);}
.import-hint{font-size:10px;color:var(--silver);opacity:.7;flex:1;}
.import-ok{color:#4CAF50!important;opacity:1!important;}
.import-err{color:#FF5555!important;opacity:1!important;}

.fp-footer{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.btn-print{flex:1;background:var(--red);color:var(--white);border:none;border-radius:6px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:background .15s;}
.btn-print:hover{background:var(--red-h);}
.btn-reset{background:transparent;color:var(--silver);border:1px solid var(--border);border-radius:6px;padding:11px 14px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-reset:hover{border-color:var(--lt);color:var(--white);}

/* ── PREVIEW ── */
.preview-panel{flex:1;background:#CBCBCB;overflow-y:auto;display:flex;justify-content:center;padding:28px 24px;}

.invoice{background:#FFF;width:760px;min-height:1040px;padding:0;box-shadow:0 6px 32px rgba(0,0,0,.35);font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;color:#111;flex-shrink:0;}
.inv-stripe{height:6px;background:linear-gradient(90deg,#8B1212,#B31B1B,#CC2020,#B31B1B);}
.inv-inner{padding:32px 40px;}

.inv-top{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:20px;border-bottom:2.5px solid #B31B1B;margin-bottom:18px;}
.inv-logo-wrap img{max-height:72px;max-width:320px;object-fit:contain;}
.inv-title-wrap{text-align:right;}
.inv-title{font-size:30px;font-weight:900;letter-spacing:14px;color:#111;text-indent:14px;}
.inv-subtitle{font-size:11px;color:#888;letter-spacing:2px;margin-top:3px;}

.inv-info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px 20px;margin-bottom:18px;font-size:12.5px;background:#F9F9F9;padding:13px 16px;border-radius:4px;border:1px solid #E0E0E0;}
.inv-info-full{grid-column:1/-1;}
.inf{display:flex;gap:3px;align-items:baseline;}
.inf .lbl{color:#666;white-space:nowrap;font-size:12px;}
.inf .val{color:#111;font-weight:600;word-break:break-all;}

.inv-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.inv-table thead tr{background:#1A1A1A;}
.inv-table thead th{color:#FFF;padding:8px 9px;text-align:center;font-weight:600;letter-spacing:.5px;font-size:12px;border:1px solid #1A1A1A;}
.inv-table thead th.t-name,.inv-table thead th.t-note{text-align:left;}
.inv-table tbody td{padding:7px 9px;border:1px solid #DADADA;text-align:center;vertical-align:middle;font-size:12.5px;}
.inv-table td:nth-child(2),.inv-table th:nth-child(2){white-space:nowrap;}
.inv-table tbody td.t-name,.inv-table tbody td.t-note{text-align:left;}
.inv-table tbody td.t-note{font-size:12px;color:#444;}
.inv-table tbody td.t-num{text-align:right;}
.inv-table tbody tr:nth-child(even){background:#F8F8F8;}
.inv-table tbody tr.empty-row td{height:30px;}

.inv-bottom{display:grid;grid-template-columns:1fr 200px;border:1px solid #DADADA;border-top:none;}
.inv-notes{padding:12px 14px;border-right:1px solid #DADADA;font-size:12px;min-height:96px;}
.inv-notes .nt{font-weight:700;font-size:12.5px;margin-bottom:4px;}
.inv-notes .nc{color:#333;white-space:pre-wrap;margin-bottom:8px;}
.inv-notes .np{color:#333;line-height:1.7;font-size:12px;}
.inv-notes .np strong{font-size:12.5px;}

.inv-summary{}
.inv-sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid #DADADA;font-size:13px;}
.inv-sum-row:last-child{border-bottom:none;background:#1A1A1A;color:#FFF;font-weight:700;font-size:14px;}
.inv-sum-row .sl{color:#444;font-weight:500;}
.inv-sum-row:last-child .sl{color:#CCC;}
.inv-sum-row .sv{font-weight:600;}

.inv-sig{display:grid;grid-template-columns:1fr 1fr;margin-top:44px;gap:40px;padding:0 10px;}
.sig-block{text-align:center;}
.sig-role{font-size:12px;color:#888;margin-bottom:3px;}
.sig-name{font-size:15px;font-weight:700;color:#111;margin-bottom:42px;}
.sig-line{border-top:2px solid #111;}

@media print{
  body{background:#FFF;overflow:visible;height:auto;}
  .form-panel{display:none!important;}
  .preview-panel{padding:0;background:#FFF;overflow:visible;display:block;}
  .invoice{box-shadow:none;width:100%;min-height:auto;}
  @page{size:A4;margin:8mm 10mm;}
}
</style>
</head>

<script>
/* ── ERP Import ── */
function handleImport(file) {
  if (!file) return;
  document.getElementById('erp-file').value = '';
  const hint = document.getElementById('import-hint');

  if (!file.name.toLowerCase().endsWith('.pdf')) {
    hint.textContent = '僅支援鼎新A1 PDF 格式';
    hint.className = 'import-hint import-err';
    return;
  }
  if (items.some(i => i.code || i.name)) {
    if (!confirm('匯入會覆蓋現有資料，確定繼續？')) return;
  }

  hint.textContent = '解析中…';
  hint.className = 'import-hint';

  parsePDF(file)
    .then(() => {
      hint.textContent = '✓ 匯入成功';
      hint.className = 'import-hint import-ok';
      setTimeout(() => { hint.textContent = '支援鼎新A1 PDF'; hint.className = 'import-hint'; }, 3000);
    })
    .catch(e => {
      console.error('[ERP Import Error]', e);
      hint.textContent = '錯誤：' + e.message;
      hint.className = 'import-hint import-err';
    });
}

const PDFJS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174';

async function parsePDF(file) {
  if (typeof pdfjsLib === 'undefined') throw new Error('PDF.js 未載入，請確認網路連線');

  // disable worker to avoid file:// protocol restriction
  pdfjsLib.GlobalWorkerOptions.workerSrc = '';

  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({
    data: buf,
    disableWorker: true,
    cMapUrl: PDFJS_CDN + '/cmaps/',   // 讓中文(CJK)字型正確解碼
    cMapPacked: true
  }).promise;
  const page = await pdf.getPage(1);
  const content = await page.getTextContent();

  console.log('[ERP] total text items:', content.items.length);

  // 文字項目太少 → 此 PDF 為圖片格式，無文字層
  if (content.items.length < 20) {
    throw new Error('此 PDF 為圖片格式（無文字層），請改用文字版匯出');
  }

  // Group text items by Y coordinate, sort each row by X
  const rowMap = {};
  for (const item of content.items) {
    if (!item.str.trim()) continue;
    const y = Math.round(item.transform[5] / 2) * 2;
    if (!rowMap[y]) rowMap[y] = [];
    rowMap[y].push({ x: item.transform[4], str: item.str, w: item.width || 0 });
  }

  // PDF Y=0 is bottom, so sort descending → top of page first
  const rows = Object.entries(rowMap)
    .sort((a, b) => parseFloat(b[0]) - parseFloat(a[0]))
    .map(([, cells]) => {
      const sorted = cells.sort((a, b) => a.x - b.x);
      let text = '';
      for (let i = 0; i < sorted.length; i++) {
        const c = sorted[i];
        if (i === 0) { text = c.str; continue; }
        const prev = sorted[i - 1];
        const gap = c.x - (prev.x + prev.w);
        text += (gap > 3 ? ' ' : '') + c.str;
      }
      return text;
    });

  console.log('[ERP] extracted rows:', rows);
  parseERPRows(rows);
}

function parseERPRows(rows) {
  const find = (pat) => { for (const r of rows) { const m = r.match(pat); if (m) return m; } return null; };
  const setVal = (id, val) => { const el = document.getElementById(id); if (el && val) el.value = val.trim(); };

  // ── 客戶資訊 ──
  const custM = find(/客戶名稱[：:]\s*(.+?)(?=\s{2,}|訂單日期|$)/);
  if (custM) setVal('f-customer', custM[1]);

  const dateM = find(/訂單日期[：:]\s*(\d{4}[\/\-]\d{2}[\/\-]\d{2})/);
  if (dateM) {
    const [y, mo, d] = dateM[1].split(/[\/\-]/);
    setVal('f-date', `${y}-${mo}-${d}`);
  }

  const contactRow = rows.find(r => /聯絡人/.test(r));
  if (contactRow) {
    const cm = contactRow.match(/聯絡人[：:]\s*(\S+)/);
    if (cm && cm[1] !== '—') setVal('f-contact', cm[1]);
    const pm = contactRow.match(/電話[：:]\s*(\S+)/);
    if (pm) setVal('f-ctel', pm[1]);
    const om = contactRow.match(/訂單單號[：:]\s*(\S+)/);
    if (om) setVal('f-ono', om[1]);
  }

  const addrM = find(/送貨地址[：:]\s*(.+)/);
  if (addrM) setVal('f-addr', addrM[1].replace(/\s*頁次.*/, ''));

  const notesRow = rows.find(r => /^備註[：:]/.test(r.trim()));
  if (notesRow) {
    const nm = notesRow.match(/^備註[：:]\s*(.+)/);
    if (nm) setVal('f-notes', nm[1].replace(/合計金額.*/, '').trim());
  }

  // ── 品項表格 ──
  const headerIdx = rows.findIndex(r => /品號/.test(r) && /品名/.test(r));
  if (headerIdx === -1) throw new Error('找不到品項表格標題');

  const footerIdx = rows.findIndex((r, i) => i > headerIdx && /合計金額/.test(r));
  const tableRows = rows.slice(headerIdx + 1, footerIdx > 0 ? footerIdx : undefined);

  // 合併跨行品名（接續行不以大寫英數開頭）
  const merged = [];
  for (const row of tableRows) {
    const t = row.trim();
    if (!t) continue;
    if (/^[A-Z][A-Z0-9]/.test(t)) {
      merged.push(t);
    } else if (merged.length > 0) {
      merged[merged.length - 1] += ' ' + t;
    }
  }

  // 解析每一行：CODE NAME UNIT QTY PRICE AMOUNT
  const unitPat = /(組|個|式|支|包|套|片|條|瓶|罐|本)\s+(\d+(?:\.\d+)?)\s+([\d,]+)\s+([\d,]+)/;
  const parsed = [];

  for (const row of merged) {
    const codeM = row.match(/^([A-Z][A-Z0-9\-\.]*)\s/);
    if (!codeM) continue;

    const code = codeM[1];
    const rest = row.substring(codeM[0].length);
    const itemM = rest.match(unitPat);
    if (!itemM) continue;

    const name = rest.substring(0, rest.indexOf(itemM[0])).trim();
    const unit = itemM[1];
    const qty  = parseFloat(itemM[2]);
    const price = parseFloat(itemM[3].replace(/,/g, ''));

    parsed.push({ id: Date.now() + Math.random(), code, name, unit, qty, price, note: '' });
  }

  if (parsed.length === 0) throw new Error('未解析到任何品項');

  items = parsed;
  renderItems();
  upd();
}

let lang = 'zh';
let items = [];

function t(key){ return (T[lang] && T[lang][key]) || key; }

function setLang(l){
  lang = l;
  document.getElementById('btn-zh').classList.toggle('active', l==='zh');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.documentElement.lang = l==='zh' ? 'zh-TW' : 'en';

  // update all data-i18n text
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[l][el.dataset.i18n];
    if(v !== undefined) el.textContent = v;
  });
  // update placeholders
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const v = T[l][el.dataset.i18nPh];
    if(v !== undefined) el.placeholder = v;
  });
  // update select options
  document.querySelectorAll('[data-i18n-opt]').forEach(el => {
    const v = T[l][el.dataset.i18nOpt];
    if(v !== undefined) el.textContent = v;
  });

  renderItems();
  upd();
}

/* ── Items ── */
function addItem(){
  items.push({id:Date.now(), code:'', name:'', unit:'', qty:1, price:0, note:''});
  renderItems();
  upd();
}

function removeItem(id){
  if(items.length<=1){ alert(lang==='zh'?'至少保留一筆項目':'At least one item is required.'); return; }
  items = items.filter(i=>i.id!==id);
  renderItems();
  upd();
}

function setItem(id, field, val){
  const it = items.find(i=>i.id===id);
  if(!it) return;
  if(field==='qty'||field==='price') val = parseFloat(val)||0;
  it[field] = val;
  if(field==='qty'||field==='price'){
    const el = document.querySelector(`[data-id="${id}"] .amt`);
    const a = it.qty*it.price;
    if(el) el.value = a>0 ? fmt(a) : '';
  }
  upd();
}

function renderItems(){
  const c = document.getElementById('items-container');
  const html = items.map(it=>`
    <div class="item-card" data-id="${it.id}">
      <div class="item-main">
        <input type="text"   class="item-code-input" placeholder="${t('iph_code')}" value="${esc(it.code)}"  onchange="setItem(${it.id},'code',this.value)" oninput="autoResizeCode(this)">
        <input type="text"   placeholder="${t('iph_name')}" value="${esc(it.name)}"  onchange="setItem(${it.id},'name',this.value)">
        <input type="text"   placeholder="${t('iph_unit')}" value="${esc(it.unit)}"  onchange="setItem(${it.id},'unit',this.value)">
        <input type="number" placeholder="${t('col_qty')}"  value="${it.qty}" min="0" step="1" onchange="setItem(${it.id},'qty',this.value)">
        <input type="number" placeholder="${t('col_price')}" value="${it.price||''}" min="0" onchange="setItem(${it.id},'price',this.value)">
        <input type="text"   placeholder="—" class="amt" value="${it.qty*it.price>0?fmt(it.qty*it.price):''}" readonly>
        <button class="btn-del" onclick="removeItem(${it.id})">×</button>
      </div>
      <div class="item-note">
        <label>${t('t_note')}</label>
        <input type="text" placeholder="${t('iph_note')}" value="${esc(it.note)}" onchange="setItem(${it.id},'note',this.value)">
      </div>
    </div>`).join('');
  c.innerHTML = html;
  c.querySelectorAll('.item-code-input').forEach(autoResizeCode);
}

/* ── Auto-resize 品號 input ── */
function autoResizeCode(el){
  const span = document.createElement('span');
  span.style.cssText = 'position:absolute;visibility:hidden;font-size:12px;font-family:inherit;white-space:nowrap;padding:5px 6px;';
  span.textContent = el.value || el.placeholder || '';
  document.body.appendChild(span);
  el.style.width = Math.max(48, span.offsetWidth + 8) + 'px';
  document.body.removeChild(span);
}

/* ── Helpers ── */
function esc(s){ return (s||'').replace(/"/g,'&quot;'); }
function fmt(n){ return Math.round(n).toLocaleString('zh-TW'); }
function gv(id){ return (document.getElementById(id)||{}).value||''; }
function st(id, val){ const el=document.getElementById(id); if(el) el.textContent=val||'—'; }

/* ── Update Preview ── */
function upd(){
  st('p-customer', gv('f-customer'));
  st('p-contact',  gv('f-contact'));
  st('p-ctel',     gv('f-ctel'));
  st('p-sales',    gv('f-sales'));
  st('p-taxid',    gv('f-taxid'));
  st('p-addr',     gv('f-addr'));
  st('p-ono',      gv('f-ono'));
  st('p-cur',      gv('f-cur'));
  st('p-tel',      gv('f-tel'));
  st('p-buyer',    gv('f-customer')||'—');

  const dv = gv('f-date');
  if(dv){ const[y,m,d]=dv.split('-'); st('p-date',`${y}/${m}/${d}`); }
  else   { st('p-date','—'); }

  // table rows
  const tbody = document.getElementById('p-items');
  let rows = items.map((it,i)=>{
    const empty = !it.name && !it.code;
    const amt = it.qty*it.price;
    return empty
      ? `<tr class="empty-row"><td>${i+1}</td><td></td><td class="t-name"></td><td></td><td></td><td></td><td></td><td class="t-note"></td></tr>`
      : `<tr><td>${i+1}</td><td>${it.code}</td><td class="t-name">${it.name}</td><td>${it.unit}</td>
           <td class="t-num">${it.qty}</td><td class="t-num">${it.price>0?fmt(it.price):''}</td>
           <td class="t-num">${amt>0?fmt(amt):''}</td><td class="t-note">${it.note}</td></tr>`;
  });
  let n = rows.length;
  while(n<5){ rows.push(`<tr class="empty-row"><td>${n+1}</td><td></td><td class="t-name"></td><td></td><td></td><td></td><td></td><td class="t-note"></td></tr>`); n++; }
  tbody.innerHTML = rows.join('');

  // totals
  const sub = items.reduce((s,i)=>s+(i.qty*i.price),0);
  const tr  = parseInt(gv('f-tax'))||0;
  const tax = Math.round(sub*tr/100);
  const tot = sub+tax;
  document.getElementById('p-sub').textContent    = fmt(sub);
  document.getElementById('p-taxval').textContent = fmt(tax);
  document.getElementById('p-total').textContent  = fmt(tot);
  document.getElementById('p-taxlbl').textContent = `${tr}%`;

  // notes
  document.getElementById('p-notes').textContent = gv('f-notes');

  // payment info
  const bk = gv('f-bank'), ac = gv('f-acct');
  const pp = document.getElementById('p-payment');
  pp.innerHTML = (bk||ac)
    ? `<strong>${t('payment_hdr')}</strong><br>${t('payment_bank')}${bk}<br>${t('payment_acct')}${ac}`
    : '';
}

  ['f-customer','f-contact','f-ctel','f-taxid','f-addr','f-notes'].forEach(id=>{ document.getElementById(id).value=''; });

  document.getElementById('f-tax').value   = '5';
